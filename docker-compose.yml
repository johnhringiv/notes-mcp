# Standard self-host path: copy .env.example → .env, fill it in, then
#   docker compose up -d
# Nothing here needs editing — everything tunable lives in .env
# (COMPOSE_PROFILES picks the ingress; see "Bring your own reverse proxy"
# in README.md for the docker-compose.override.yml pattern).
#
# Synology/DSM hosts: use deploy/deploy.sh instead — DSM's firewall drops
# egress from compose-created custom bridge networks (see deploy/README.md).
services:
  mcp-server:
    image: ${IMAGE:-ghcr.io/johnhringiv/notes-mcp:latest}
    build: .
    container_name: notes-mcp
    restart: unless-stopped
    mem_limit: 2g
    environment:
      NOTES_REPO_URL: ${NOTES_REPO_URL:?set in .env}
      NOTES_REPO_BRANCH: ${NOTES_REPO_BRANCH:-main}
      GITHUB_TOKEN: ${GITHUB_TOKEN:?set in .env}
      PUBLIC_URL: ${PUBLIC_URL:?set in .env}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:?set in .env}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:?set in .env}
      GITHUB_ALLOWED_LOGIN: ${GITHUB_ALLOWED_LOGIN:?set in .env}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - notes-repo:/repo
      - oauth-state:/data
    networks:
      - mcp
    # No published ports: ingress (cloudflared, or your own reverse proxy
    # added via an override file) is the only way in.

  # Default ingress; enabled by COMPOSE_PROFILES=cloudflared in .env.
  # Using your own reverse proxy instead: set COMPOSE_PROFILES= (empty) and
  # publish the server port with a docker-compose.override.yml (README.md).
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles:
      - cloudflared
    command: tunnel --no-autoupdate run
    environment:
      # :- not :? — compose interpolates this file even when the profile is off
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    networks:
      - mcp
    depends_on:
      - mcp-server

volumes:
  notes-repo:
  oauth-state:

networks:
  mcp:
